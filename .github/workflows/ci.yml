name: CI

# FOUNDATION 1: TRIGGER — When does this workflow run?
# Day 23 learning: Triggers control WHEN the pipeline executes
# - push: integrates code immediately after merge (catch bugs fast)
# - pull_request: merge gate (block merge if CI fails)
on:
  push:
    branches: [master]
  pull_request:

# PERMISSION: Explicit scopes for security (principle of least privilege)
# - contents: read — can clone repo + read code
# - packages: write — can push Docker images to GHCR
# See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # JOB 1: TEST
  # ============================================================
  # Purpose: Run unit + integration tests
  # PARALLEL with lint — both run simultaneously
  # First failure stops remaining steps (fail-fast behavior)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Run test suite (Jest in this case)
      # ✏️ REPLACE with your test command if different
      - run: npm test

  # ============================================================
  # JOB 2: BUILD-IMAGE
  # ============================================================
  # Purpose: Build Docker image + push to GHCR (GitHub Container Registry)
  # DEPENDENCY: Runs ONLY after test passes (needs: [test])
  # If test fails, this job is SKIPPED (not run, not failed)
  # DAG: test → build-image
  build-image:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      # Setup Docker buildx for multi-architecture builds
      # (We use single arch here, but buildx is industry standard)
      - uses: docker/setup-buildx-action@v3

      # Login to GHCR (GitHub Container Registry)
      # Why GHCR? No separate credentials needed — uses GitHub auth
      # registry: ghcr.io — the registry endpoint
      # username: ${{ github.actor }} — your GitHub username (auto-filled)
      # password: ${{ secrets.GITHUB_TOKEN }} — auto-injected token (no setup needed!)
      # Day 23 learning: Secrets are masked in logs — safe to use
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build + push Docker image
      # Why two tags?
      # 1. SHA tag (e.g., abc123def456) — permanent, points to exact commit
      #    Use case: "which commit is running in production?" → check image SHA
      # 2. latest tag — always points to most recent build
      #    Use case: Quick pull for local testing
      # Both pushed simultaneously
      # Cache optimization:
      # - cache-from: type=gha — loads previous layer cache from GitHub Actions
      # - cache-to: type=gha,mode=max — saves all layers for future builds
      # Result: 2nd+ builds ~3x faster (reuse unchanged layers)
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3: DEPLOY
  # ============================================================
  # Purpose: Deploy to Kubernetes + verify Pod is running
  # DEPENDENCY: Runs ONLY after build-image succeeds (needs: [build-image])
  # DAG: build-image → deploy
  # Why test in CI? Prove that:
  # - Image actually runs (not just built successfully)
  # - Kubernetes manifests are valid (no syntax errors)
  # - Service startup works (readiness probe passes)
  deploy:
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v4

      # Create a kind cluster (Kubernetes in Docker)
      # kind = lightweight K8s for testing (ephemeral, tears down after job)
      # Why not full EKS? Cost + speed — 120s to spin up, sufficient for smoke test
      # cluster_name: ci-${{ github.run_id }} — unique per run (no conflicts)
      # wait: 120s — timeout if cluster doesn't start (fail fast)
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci-${{ github.run_id }}
          wait: 120s

      # Update image tag in manifest
      # Why? Deployment manifest has placeholder image:
      #   image: ghcr.io/quyetnc/api-gateway:main
      # sed replaces it with the ACTUAL commit SHA:
      #   image: ghcr.io/quyetnc/api-gateway:abc123def456
      # This ensures kind cluster pulls the image we just built
      # Alternative: Use kustomize (if you prefer structured config)
      - name: Update image tag in manifest
        run: |
          sed -i "s|image: ghcr.io.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" k8s/deployment.yaml

      # Apply Kubernetes manifests
      # kubectl apply -f k8s/ — idempotent operation (safe to run multiple times)
      # Creates Deployment, Pod, Service (if defined in manifest)
      - name: Apply K8s manifests
        run: kubectl apply -f k8s/

      # Wait for rollout to complete
      # Why? Ensure Pod reached Running state + passed readiness probe
      # timeout: 180s — fail if Pod doesn't stabilize in 3 minutes
      # This catches image pull failures, startup errors, etc.
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway --timeout=180s

      # Show running image (proof that deployment worked)
      # This outputs:
      # - Pod name, Node, IP (networking info)
      # - Image SHA that's actually running (verification that correct commit deployed)
      # - Status: Running (not CrashLoopBackOff)
      # Useful for debugging failed deployments
      - name: Show running image
        run: |
          kubectl get pods -o wide
          kubectl describe pod -l app=api-gateway | grep -E "Image:|Status:"
